<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/file.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEAVEN'S ARENA</title>
    <meta name="description" content="Manage your fitness center memberships, monitor fees due in 7 days or overdue list, register new members, and process quick extensions or renewals." />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.remove('light');
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-zinc-50 dark:bg-black transition-colors duration-300 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
